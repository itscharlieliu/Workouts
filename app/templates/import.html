{% extends 'base.html' %}
{% block content %}
<h1>Import CSV</h1>
<div class="grid two">
  <div class="card">
    <p>Expected columns: <code>workout_date, workout_name, exercise, set_number, weight, reps, rpe, set_type</code></p>
    <form method="post" enctype="multipart/form-data" class="stack">
      <input type="file" name="file" accept=".csv,text/csv" required>
      <button type="submit">Import CSV</button>
    </form>
  </div>
  <div class="card">
    <h2>Import existing workspace log</h2>
    <p>Pull in workouts already stored in <code>fitness/workout_log.jsonl</code>.</p>
    <form method="post" action="{{ url_for('import_workspace_log') }}">
      <button type="submit">Import workspace log</button>
    </form>
  </div>
</div>
{% endblock %}
