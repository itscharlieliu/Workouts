{% extends 'base.html' %}
{% block content %}
<h1>Exercises</h1>
<div class="grid two">
  <section class="card">
    <h2>Add Exercise</h2>
    <form method="post" class="stack">
      <label>Name<input name="name" required></label>
      <label>Category<input name="category"></label>
      <label>Equipment<input name="equipment"></label>
      <label>Tracking mode
        <select name="tracking_mode">
          <option value="strength">Strength</option>
          <option value="cardio">Cardio / distance</option>
          <option value="timed">Timed</option>
        </select>
      </label>
      <label>Notes<textarea name="notes"></textarea></label>
      <button type="submit">Add</button>
    </form>
  </section>
  <section class="card">
    <h2>Library</h2>
    <div class="table-wrap">
    <table>
      <tr><th>Name</th><th>Mode</th><th>Category</th><th>Equipment</th></tr>
      {% for ex in exercises %}
      <tr><td>{{ ex['name'] }}</td><td>{{ ex['tracking_mode'] }}</td><td>{{ ex['category'] or '' }}</td><td>{{ ex['equipment'] or '' }}</td></tr>
      {% else %}
      <tr><td colspan="4">No exercises yet.</td></tr>
      {% endfor %}
    </table>
    </div>
  </section>
</div>
{% endblock %}
